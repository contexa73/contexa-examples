server:
  port: 9090

spring:
  application:
    name: legacy-system-with-contexa
  datasource:
    url: jdbc:postgresql://localhost:5432/identity
    username: admin
    password: 1111
    driver-class-name: org.postgresql.Driver
  thymeleaf:
    cache: false

# Contexa AI Security Configuration
contexa:
  zero-trust:
    enabled: true
    ai:
      chat:
        model:
          priority: openai,ollama
      ollama:
        base-url: http://127.0.0.1:11434
        chat:
          options:
            model: qwen2.5:7b
            keep-alive: "24h"
        embedding:
          enabled: true
          model: mxbai-embed-large
      openai:
        api-key: ${OPENAI_API_KEY:}
        base-url: https://api.openai.com
        chat:
          options:
            model: gpt-4o-mini
            temperature: 0.3
          enabled: true
        embedding:
          enabled: false

logging:
  level:
    io.contexa: INFO
    io.contexa.contexaexamplelegacysystem: DEBUG
