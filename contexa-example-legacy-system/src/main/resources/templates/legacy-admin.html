<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Legacy System - Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #f0f2f5; padding: 24px; }
        .container { background: white; padding: 32px; border-radius: 12px;
                     box-shadow: 0 2px 8px rgba(0,0,0,0.06); max-width: 800px; }
        h1 { font-size: 1.3rem; margin-bottom: 16px; }
        .legacy-badge { background: #dc3545; color: white; padding: 2px 8px;
                        border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
        p { color: #666; margin-bottom: 16px; line-height: 1.6; }
        a { color: #1a73e8; }
    </style>
</head>
<body>
<div class="container">
    <span class="legacy-badge">ADMIN ONLY</span>
    <h1>Legacy Admin Panel</h1>
    <p>This page is accessible only to users with ADMIN role.</p>
    <p>Protected by @LegacyRole("ADMIN") + LegacyAuthorizationInterceptor.</p>
    <p>Current user: <strong th:text="${user?.displayName}">Unknown</strong></p>
    <p><a href="/legacy/dashboard">Back to Dashboard</a></p>
</div>
</body>
</html>
