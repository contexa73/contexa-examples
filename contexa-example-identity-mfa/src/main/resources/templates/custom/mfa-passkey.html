<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${csrfToken}">
    <meta name="_csrf_header" th:content="${csrfHeaderName}">
    <meta name="_csrf_parameter" th:content="${csrfParameterName}">
    <title>Passkey Verification</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 30%, rgba(99,102,241,.15), transparent),
                radial-gradient(ellipse 500px 350px at 80% 70%, rgba(139,92,246,.12), transparent);
            pointer-events: none;
        }
        .card {
            position: relative;
            width: 100%;
            max-width: 420px;
            background: rgba(30,41,59,.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148,163,184,.12);
            border-radius: 20px;
            padding: 40px 32px 36px;
            box-shadow: 0 24px 64px rgba(0,0,0,.35);
            text-align: center;
        }
        .icon {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon svg { width: 26px; height: 26px; fill: #fff; }
        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -.3px;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .sub {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .user-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 14px;
            background: rgba(15,23,42,.5);
            border: 1px solid rgba(148,163,184,.1);
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
        }
        .user-badge strong { color: #e2e8f0; font-weight: 600; }
        .btn {
            display: block;
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            cursor: pointer;
            transition: opacity .2s, transform .1s;
        }
        .btn:hover { opacity: .9; }
        .btn:active { transform: scale(.98); }
        .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
        .toast {
            display: none;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 13px;
            text-align: left;
        }
        .toast.error { background: rgba(239,68,68,.12); color: #fca5a5; border: 1px solid rgba(239,68,68,.2); }
        .link {
            margin-top: 20px;
            font-size: 13px;
            color: #64748b;
        }
        .link a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            transition: color .2s;
        }
        .link a:hover { color: #c4b5fd; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">
        <svg viewBox="0 0 24 24"><path d="M12.65 10a6 6 0 1 0-1.3 0H2v2h1v8h2v-8h4.35A6 6 0 0 0 12 18a6 6 0 0 0 2.65-1H22v-2h-4.05A6 6 0 0 0 18 12a6 6 0 0 0-.35-2H22v-2h-9.35zM12 16a4 4 0 1 1 0-8 4 4 0 0 1 0 8z"/></svg>
    </div>
    <h1>Passkey Verification</h1>
    <p class="sub">Use your biometric or security key to continue.</p>

    <div class="user-badge">User: <strong th:text="${username}"></strong></div>

    <button id="authButton" class="btn" type="button">Authenticate with Passkey</button>
    <div id="errorMessage" class="toast error"></div>

    <div class="link">
        No registered passkey?
        <a th:href="@{${passkeyRegistrationUrl}}">Register passkey</a>
    </div>

    <div id="contexa-page-config"
         th:attr="data-token-persistence=${tokenPersistence},
                  data-failure-url=${mfaFailureUrl},
                  data-mfa-session-id=${mfaSessionId},
                  data-mfa-sdk-required=${mfaSdkRequired}">
    </div>
</div>

<script th:src="@{/js/contexa-mfa-sdk.js}"></script>
<script th:src="@{/js/contexa-passkey-page.js}"></script>
</body>
</html>
