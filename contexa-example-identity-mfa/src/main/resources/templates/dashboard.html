<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - MFA Example</title>
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, sans-serif; background: #0f172a; color: #e2e8f0; }
        .card { width: 100%; max-width: 400px; background: rgba(30,41,59,.7); border: 1px solid rgba(148,163,184,.12); border-radius: 16px; padding: 40px 32px; text-align: center; }
        h1 { font-size: 22px; color: #f1f5f9; margin-bottom: 8px; }
        .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
        a { color: #818cf8; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
<div class="card">
    <h1>MFA Authentication Complete</h1>
    <p class="sub">You have successfully completed multi-factor authentication.</p>
    <span class="badge">MFA Verified</span>
    <p style="margin-top: 20px;"><a href="/api/profile">View Profile API</a></p>
</div>
</body>
</html>
