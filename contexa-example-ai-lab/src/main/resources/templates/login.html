<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Lab</title>
    <link rel="stylesheet" th:href="@{/css/contexa-common.css}">
</head>
<body>
<div class="ctx-login-container">
    <div class="ctx-card" style="max-width: 400px; margin: 100px auto;">
        <h2>AI Lab Login</h2>
        <div th:if="${param.error}" class="ctx-alert-error">Invalid username or password.</div>
        <form th:action="@{/login}" method="post">
            <div class="ctx-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="ctx-input" required autofocus>
            </div>
            <div class="ctx-form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="ctx-input" required>
            </div>
            <button type="submit" class="ctx-btn ctx-btn-primary" style="width:100%">Sign In</button>
        </form>
    </div>
</div>
</body>
</html>
