<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Multi MFA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a14; color: #e2e8f0; }
        .card { width: 100%; max-width: 440px; background: rgba(30,41,59,.7); border: 1px solid rgba(148,163,184,.12); border-radius: 16px; padding: 40px 32px; text-align: center; }
        .flow-badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-size: 11px; font-weight: 600; background: rgba(139,92,246,.15); color: #a78bfa; border: 1px solid rgba(139,92,246,.25); margin-bottom: 20px; }
        h1 { font-size: 22px; color: #f1f5f9; margin-bottom: 8px; }
        .sub { font-size: 13px; color: #94a3b8; margin-bottom: 24px; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; background: rgba(34,197,94,.15); color: #4ade80; border: 1px solid rgba(34,197,94,.25); }
        .info { margin-top: 24px; padding: 16px; background: rgba(139,92,246,.06); border: 1px solid rgba(139,92,246,.15); border-radius: 10px; text-align: left; }
        .info-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
        .info-label { color: #94a3b8; }
        .info-value { color: #e2e8f0; font-weight: 500; font-family: monospace; }
        .links { margin-top: 20px; display: flex; gap: 16px; justify-content: center; }
        a { color: #818cf8; text-decoration: none; font-size: 13px; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <span class="flow-badge">Admin Flow (Passkey)</span>
    <h1>Admin Dashboard</h1>
    <p class="sub">Multi-factor authentication completed via Passkey.</p>
    <span class="badge">MFA Verified</span>

    <div class="info">
        <div class="info-row">
            <span class="info-label">MFA Flow</span>
            <span class="info-value">mfa_admin</span>
        </div>
        <div class="info-row">
            <span class="info-label">2nd Factor</span>
            <span class="info-value">Passkey (WebAuthn)</span>
        </div>
        <div class="info-row">
            <span class="info-label">URL Prefix</span>
            <span class="info-value">/admin</span>
        </div>
        <div class="info-row">
            <span class="info-label">SecurityMatcher</span>
            <span class="info-value">/admin/**</span>
        </div>
    </div>

    <div class="links">
        <a href="/api/profile">View Profile API</a>
        <a href="/">Home</a>
    </div>
</div>
</body>
</html>
